version: '3.8'
services:
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    networks:
      - devops_net

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    networks:
      - devops_net

networks:
  devops_net:
volumes:
  jenkins_data: